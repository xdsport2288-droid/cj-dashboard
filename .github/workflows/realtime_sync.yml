name: 5-Minute Realtime Data Sync

on:
  schedule:
    # 5분 간격 실행 (GitHub Actions 최소 주기)
    - cron: '*/5 * * * *'
  # 수동으로 버튼을 눌러 실행할 수 있도록 허용
  workflow_dispatch:

permissions:
  contents: write # GITHUB_TOKEN에 쓰기 권한 부여 (필수)

jobs:
  auto-update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v3

      - name: 파이썬(Python) 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl bs4
          playwright install chromium

      - name: 🚀 1단계. 협력사 사이트 접속 및 엑셀 다운로드 봇 실행
        env:
          TMS_USER_ID: ${{ secrets.TMS_USER_ID }}
          TMS_USER_PW: ${{ secrets.TMS_USER_PW }}
        run: |
          python auto_downloader.py

      - name: 📸 에러 스크린샷 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png

      - name: 🔄 2단계. 다운로드된 엑셀을 대시보드용 JSON으로 자동 변환
        run: |
          python convert_excel_to_json.py

      - name: 💾 3단계. 변경된 데이터 저장 및 배포 (Commit & Push)
        run: |
          git config --global user.name "Anti-Gravity Bot"
          git config --global user.email "bot@anti-gravity.local"
          git add dashboard_data.xlsx dashboard_data.json
          git commit -m "🚀 실시간 데이터 자동 동기화 (5분 주기)" || echo "변경된 데이터가 없습니다."
          git push
